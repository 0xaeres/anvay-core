services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ANVAY_ALLOWED_ORIGINS: "${ANVAY_ALLOWED_ORIGINS}"
    volumes:
      - ./anvay.yaml:/app/anvay.yaml:ro
      - anvay_data:/var/lib/anvay/data
      - anvay_skills:/var/lib/anvay/skills
    depends_on:
      qdrant:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      ANVAY_API_DOMAIN: "${ANVAY_API_DOMAIN}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  anvay_data:
  anvay_skills:
  qdrant_data:
  caddy_data:
  caddy_config:
